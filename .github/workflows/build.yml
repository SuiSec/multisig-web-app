name: build

# Reproducible build + verifiable release. On every push/PR it builds the app
# deterministically and publishes a SHA-256 manifest so a deployment can be
# checked against this source. On a version tag it also cuts a GitHub Release
# with the built bundle, the manifest, and build provenance.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # create releases
  id-token: write # provenance attestation
  attestations: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      # Fixed, PUBLIC build-time config. Anyone reproducing a release must use
      # the same values to get identical hashes — they are documented in the
      # README "Verify a release" section. Overridable via repo variables.
      - name: Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.suisec.app' }}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ vars.VITE_WALLETCONNECT_PROJECT_ID }}
        run: bun run build

      - name: Assert no external font/CDN requests
        run: |
          if grep -rIl "fonts.googleapis\|fonts.gstatic" app/dist; then
            echo "::error::build output references an external font CDN"; exit 1
          fi

      - name: Generate SHA-256 manifest
        run: bun scripts/build-manifest.mjs | tee build-summary.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: |
            app/dist
            dist-manifest.txt
            dist-digest.txt
          retention-days: 30

      # --- release-only steps (version tags) ---
      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist-manifest.txt

      - name: Package bundle
        if: startsWith(github.ref, 'refs/tags/')
        run: (cd app && zip -qr ../dist.zip dist)

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist.zip
            dist-manifest.txt
            dist-digest.txt
          body_path: build-summary.txt
